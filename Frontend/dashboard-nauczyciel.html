<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Geobecność</title>
    <link rel="stylesheet" href="styl.css">
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
    <style>
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #d8edd6;
            margin-bottom: 32px;
        }
        .dashboard-header h1 {
            margin: 0;
            font-size: 2rem;
            color: #14532d;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .user-info span {
            font-weight: 600;
            color: #1f2f24;
        }
        .btn-logout {
            background: #dc2626;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .dashboard-card {
            padding: 24px;
            border-radius: 16px;
            background: #f6fbf6;
            border: 1px solid #d9edd6;
            box-shadow: 0 8px 24px rgba(29, 78, 43, 0.08);
            display: inline-block;
            margin: 0 auto;
            max-width: 35%;
        }
        .dashboard-card h3 {
            margin: 0 0 16px;
            font-size: 1.4rem;
            color: #14532d;
        }
        .dashboard-card p {
            margin: 10px 3px;
            color: #334338;
            line-height: 1.6;
            width: auto;
            font-size: 110%;
        }

        .dashboard-card button:hover {
            background: #15803d;
        }
        main{
            display: flex;
            align-items: center;
        }
        
    </style>
    <script src="script.js"></script>
</head>
<body>
    <div class="page-shell">
        <header class="dashboard-header">
            <h1>GEOBECNOŚĆ</h1>
            <div class="user-info">
                <span id="nazwa">Witaj, [Nazwa Użytkownika]</span>
                <button class="btn-logout" id="logout" >Wyloguj się</button>
            </div>
        </header>

        <main>
            <div class="dashboard-card">
                <h3>Sprawdź obecność</h3>
                <p>Zobacz obecność uczniów na poszczególnych lekcjach</p>
                <button class="btn"onclick="alert('weewoo')">Zobacz rekordy</button>
            </div>
        </main>
    </div>

    <footer>
        <p>Stworzone przez Piotra Migasa, Bartłomieja Senatora, Dominika Chmielowca, Kacpra Maciejewicza, Gabrielę Piekarską i Oleksandra Tkachenko </p>
    </footer>
    <script>
        async function wypelnij_imie() {
            dane = JSON.parse(await zapytajSerwer("wybierzImieNazwisko"))
            document.getElementById("nazwa").innerText = "Witaj, "+dane.imie[0]+". "+dane.nazwisko;
        }

        document.getElementById("logout").addEventListener('click',()=>{
            zapytajSerwer("wylogujNauczyciel");
            window.location.href = "index.html";
        })

        wypelnij_imie();

    </script>
</body>
</html>
