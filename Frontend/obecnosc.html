<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Obecność - Geobecność</title>
    <link rel="stylesheet" href="styl.css">
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
    <style>
      body {
        margin: 0;
        background: #ebf5ee;
        font-family: "Inter", "Segoe UI", sans-serif;
        color: #1f2f24;
      }
      
      .page-shell {
        max-width: 960px;
        margin: 40px auto;
        padding: 32px;
        background: #ffffff;
        border: 1px solid #d8edd6;
        border-radius: 28px;
        box-shadow: 0 24px 45px rgba(29, 78, 43, 0.08);
      }
      h1 {
        margin: 0 0 18px;
        color: #14532d;
        font-size: 2.1rem;
      }
      .controls {
        display: grid;
        grid-template-columns: repeat(3, minmax(220px, 1fr));
        gap: 18px;
        margin-bottom: 24px;
      }
      .control {
        display: flex;
        flex-direction: column;
      }
      .control label {
        margin-bottom: 10px;
        font-weight: 700;
        color: #334338;
      }
      .control select,
      .control input[type="date"] {
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid #c9e3cc;
        background: #f8faf8;
        font-size: 1rem;
      }
      .control select:focus,
      .control input[type="date"]:focus {
        outline: none;
        border-color: #16a34a;
        box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.1);
      }
      .attendance-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        background: #ffffff;
        border-radius: 18px;
        overflow: hidden;
      }
      .attendance-table th,
      .attendance-table td {
        border-bottom: 1px solid #e2f0e2;
        padding: 16px 14px;
        text-align: center;
      }
      .attendance-table th {
        background: #eff9ee;
        color: #14532d;
        font-weight: 700;
      }
      .attendance-table tr:last-child td {
        border-bottom: none;
      }
      .attendance-table td:first-child {
        text-align: left;
        color: #334338;
        font-weight: 600;
      }
      .status-present {
        color: #166534;
        font-weight: 700;
      }
      .status-absent {
        color: #b91c1c;
        font-weight: 700;
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        margin-top: 22px;
        color: #16a34a;
        text-decoration: none;
        font-weight: 700;
      }
      .back-link:hover {
        text-decoration: underline;
      }
      
      @media (max-width: 720px) {
        .controls {
          grid-template-columns: 1fr;
        }
        .table-wrapper{
            overflow: auto;
        }
        .attendance-table th,
        .attendance-table td {
          padding: 1vw;
        }
      }
      button{
        margin-top: 10%;
      }
    </style>
    <script src="script.js"></script>
  </head>
  <body>

      <a class="back-link" href="dashboard-admin.html">Powrót do panelu</a>
