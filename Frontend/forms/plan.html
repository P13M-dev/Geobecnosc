<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan lekcji - Geobecność</title>
    <link rel="stylesheet" href="formsStyle.css">
    <style>
        .field { margin-bottom: 24px; }
        .field label { display: block; margin-bottom: 8px; font-weight: 600; color: #334338; }
        .field input, .field select { width: 100%; padding: 12px 14px; border: 1px solid #c9e3cc; border-radius: 10px; }
        .field input:focus, .field select:focus { outline: none; border-color: #16a34a; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
        th, td { border: 1px solid #d9edd6; padding: 12px; text-align: center; background: #ffffff; }
        th { background: #e6f4e6; color: #14532d; }
        .cell-input { width: 100%; border: 1px solid #c9e3cc; border-radius: 8px; padding: 8px; }

    </style>
    <script src="../script.js"></script>
</head>
<body>
    <div class="page-shell">
        <h1>Dodaj plan lekcji</h1>
        <form id="scheduleForm">
            <div class="field">
                <label for="scheduleClass">Do której klasy należy</label>
                <select id="scheduleClass" required></select>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Godzina / Dzień</th>
                        <th>Poniedziałek</th>
                        <th>Wtorek</th>
                        <th>Środa</th>
                        <th>Czwartek</th>
                        <th>Piątek</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <th>0.</th>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                    <tr>
                        <th>1.</th>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                    <tr>
                        <th>2.</th>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                    <tr>
                        <th>3.</th>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                    <tr>
                        <th>4.</th>
                        <td></td>

                        <td></td>
                    </tr>
                    <tr>
                        <th>5.</th>

                        <td></td>
                    </tr>
                    <tr>
                        <th>6.</th>
                        <td></td>
                        <td></td>

                        <td></td>
                        <td></td>
                    </tr>
                    <tr>
                        <th>7.</th>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                    <tr>
                        <th>8.</th>
                        <td></td>
                        <td></td>
                        <td></td>

                        <td></td>
                    </tr>
                    <tr>
                        <th>9.</th>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                </tbody>
            </table>
            <button type="submit" class="btn">Zapisz plan</button>
        </form>
        <div class="nav"><a href="../dashboard-admin.html">Powrót do panelu</a></div>
    </div>
    <script>
        async function zaladujPrzedmioty(){
            przedmioty = JSON.parse(await zapytajSerwer("wybierzPrzedmioty"));
            (document.querySelectorAll("tbody tr")).forEach(element => {
                (element.querySelectorAll("td")).forEach(td =>{
                    let wybor = document.createElement("select");
                    przedmioty.forEach(przedmiot =>{
                        let opcje = document.createElement("option");
                        opcje.value = przedmiot.id;
                        opcje.textContent = przedmiot.nazwa;
                        wybor.appendChild(opcje);
                    });
                    td.appendChild(wybor);
                });
            });
        };

        async function zaladujKlasy(){
            klasy = JSON.parse(await zapytajSerwer("wybierzKlasy"));
            klasy.forEach(klasa => {
                let wybor = document.createElement("option");
                wybor.value = klasa.id;
                wybor.textContent = klasa.nazwa
                document.getElementById("scheduleClass").appendChild(wybor);
            });
        }
        
        document.getElementById('scheduleForm').addEventListener('submit', function(e) {
            e.preventDefault();
            window.location.href = '../dashboard-admin.html';
        });
        zaladujPrzedmioty();
        zaladujKlasy();
    </script>
</body>
</html>
