<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przedmiot - Geobecność</title>
    <link rel="stylesheet" href="formsStyle.css">
    <script src="../script.js"></script>
    <link rel="shortcut icon" href="../favicon.png" type="image/x-icon">
    <style>
    .list {
        max-height: 35vh;
    }
    </style>
</head>
<body>
    <div class="page-shell">
        <h1>Przedmioty</h1>
        <div class="page-content">
            <section class="list-panel">
                <ul id="przedmiotyList" class="list"></ul>
            </section>
            <section class="form-panel">
                <h2>Dodaj nowy przedmiot</h2>
                <form id="subjectForm">
                    <div class="field">
                        <label for="subjectName">Nazwa przedmiotu</label>
                        <input type="text" id="subjectName" required>
                    </div>
                    <button type="submit" class="btn">Zapisz przedmiot</button>
                </form>
                <div class="nav"><a href="../dashboard-admin.html">Powrót do panelu</a></div>
            </section>
        </div>
    </div>
    <script>

        async function przedmiotyLista() {
            const listElement = document.getElementById('przedmiotyList');
            listElement.innerHTML = '';
            przedmioty = JSON.parse(await zapytajSerwer("wybierzPrzedmioty"));
            przedmioty.forEach((przedmiot, index) => {
                if(index>0){ 
                const item = document.createElement('li');
                item.innerHTML = `<span>${przedmiot.nazwa}</span>`;
                listElement.appendChild(item);}
            });
        }

        

        document.getElementById('subjectForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const tresc = new URLSearchParams();
            const przedmiot = document.getElementById('subjectName').value;
            tresc.append('przedmiot', przedmiot);
            console.log(await zapytajSerwer('dodajPrzedmiot', tresc));
            przedmiotyLista()
            //window.location.href = '../dashboard-admin.html';
        });
        przedmiotyLista();
    </script>
</body>
</html>
