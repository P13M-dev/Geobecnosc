<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uczeń - Geobecność</title>
    <link rel="stylesheet" href="formsStyle.css">
    <script src="../script.js"></script>
    <style>
    .list {
        max-height: 60vh;
    }
    </style>
</head>
<body>
    <div class="page-shell">
        <h1>Uczniowie</h1>
        <div class="page-content">
            <section class="list-panel">
                <ul id="uczniowieList" class="list"></ul>
            </section>
            <section class="form-panel">
            <h2>Dodaj nowego ucznia</h2>
            <form id="studentForm">
                <div class="field">
                    <label for="studentName">Imię</label>
                    <input type="text" id="studentName" required>
                </div>
                <div class="field">
                    <label for="studentSurname">Nazwisko</label>
                    <input type="text" id="studentSurname" required>
                </div>
                <div class="field">
                    <label for="studentEmail">Email</label>
                    <input type="email" id="studentEmail" required>
                </div>
                <div class="field">
                    <label for="studentPassword">Hasło</label>
                    <input type="password" id="studentPassword" required>
                </div>
                <div class="field">
                    <label for="studentClass">Klasa</label>
                    <select id="studentClass" required></select>
                </div>
                <button type="submit" class="btn">Zapisz ucznia</button>
            </form>
            <div class="nav"><a href="../dashboard-admin.html">Powrót do panelu</a></div>
        </div>
    </div>
    <script>


        async function uczniowieLista(uczniowie) {
            const listElement = document.getElementById('uczniowieList');
            listElement.innerHTML = '';
            uczniowie = JSON.parse(await zapytajSerwer("wybierzUczniow"));
            uczniowie.forEach((uczen, index) => {
                const item = document.createElement('li');
                item.innerHTML = `<span>${uczen.imie} ${uczen.nazwisko}</span>`;
                listElement.appendChild(item);
            });
        }

        

        async function zaladujPrzedmioty(){
            klasy = JSON.parse(await zapytajSerwer("wybierzKlasy"));
            klasy.forEach(klasa => {
                let wybor = document.createElement("option");
                wybor.value = klasa.id;
                wybor.textContent = klasa.nazwa
                document.getElementById("studentClass").appendChild(wybor);
            });
        }
        document.getElementById('studentForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            let tresc = new URLSearchParams,
            imie = document.getElementById("studentName").value;
            nazwisko = document.getElementById("studentSurname").value;
            email = document.getElementById("studentEmail").value;
            haslo = document.getElementById("studentPassword").value;
            klasa = document.getElementById("studentClass").value;
            tresc.append("imie",imie);
            tresc.append("nazwisko",nazwisko);
            tresc.append("email",email);
            tresc.append("haslo",haslo);
            tresc.append("klasa",klasa);
            console.log(await zapytajSerwer("dodajUcznia",tresc));
            uczniowieLista();
        });
        zaladujPrzedmioty();
        uczniowieLista();
    </script>
</body>
</html>
