<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uczeń - Geobecność</title>
    <link rel="stylesheet" href="../styl.css">
    <style>
        body { margin: 0; background: #eef3ea; font-family: Arial, sans-serif; }
        .page-shell { max-width: 540px; margin: 60px auto; padding: 32px; background: #f6fbf6; border: 1px solid #d9edd6; border-radius: 20px; box-shadow: 0 14px 35px rgba(29, 78, 43, 0.08); }
        h1 { margin: 0 0 18px; color: #14532d; }
        .field { margin-bottom: 18px; }
        .field label { display: block; margin-bottom: 8px; font-weight: 600; color: #334338; }
        .field input, .field select { width: 100%; padding: 12px 14px; border: 1px solid #c9e3cc; border-radius: 10px; }
        .field input:focus, .field select:focus { outline: none; border-color: #16a34a; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: #16a34a; color: white; font-weight: 700; cursor: pointer; }
        .btn:hover { background: #15803d; }
        .nav { margin-top: 20px; text-align: center; }
        .nav a { color: #16a34a; text-decoration: none; font-weight: 600; }
    </style>
    <script src="../script.js"></script>
</head>
<body>
    <div class="page-shell">
        <h1>Dodaj ucznia</h1>
        <form id="studentForm">
            <div class="field">
                <label for="studentName">Imię</label>
                <input type="text" id="studentName" required>
            </div>
            <div class="field">
                <label for="studentSurname">Nazwisko</label>
                <input type="text" id="studentSurname" required>
            </div>
            <div class="field">
                <label for="studentEmail">Email</label>
                <input type="email" id="studentEmail" required>
            </div>
            <div class="field">
                <label for="studentPassword">Hasło</label>
                <input type="password" id="studentPassword" required>
            </div>
            <div class="field">
                <label for="studentClass">Klasa</label>
                <!-- <input type="text" id="studentClass"  required> -->
                 <select required id="studentClass"></select>
            </div>
            <button type="submit" class="btn">Zapisz ucznia</button>
        </form>
        <div class="nav"><a href="../dashboard-admin.html">Powrót do panelu</a></div>
    </div>
    <script>
        async function zaladujPrzedmioty(){
            klasy = JSON.parse(await zapytajSerwer("wybierzKlasy"));
            klasy.forEach(klasa => {
                let wybor = document.createElement("option");
                wybor.value = klasa.id;
                wybor.textContent = klasa.nazwa
                document.getElementById("studentClass").appendChild(wybor);
            });
        }
        document.getElementById('studentForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            let tresc = new URLSearchParams,
            imie = document.getElementById("studentName").value;
            nazwisko = document.getElementById("studentSurname").value;
            email = document.getElementById("studentEmail").value;
            haslo = document.getElementById("studentPassword").value;
            klasa = document.getElementById("studentClass").value;
            tresc.append("imie",imie);
            tresc.append("nazwisko",nazwisko);
            tresc.append("email",email);
            tresc.append("haslo",haslo);
            tresc.append("klasa",klasa);

            console.log(tresc);
            console.log(await zapytajSerwer("dodajUcznia",tresc));
            window.location.href = '../dashboard-admin.html';
        });
        zaladujPrzedmioty();
    </script>
</body>
</html>
