<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nauczyciel - Geobecność</title>
    <link rel="stylesheet" href="../styl.css">
    <style>
        body { margin: 0; background: #eef3ea; font-family: Arial, sans-serif; }
        .page-shell { max-width: 540px; margin: 60px auto; padding: 32px; background: #f6fbf6; border: 1px solid #d9edd6; border-radius: 20px; box-shadow: 0 14px 35px rgba(29, 78, 43, 0.08); }
        h1 { margin: 0 0 18px; color: #14532d; }
        .field { margin-bottom: 18px; }
        .field label { display: block; margin-bottom: 8px; font-weight: 600; color: #334338; }
        .field input, .field select { width: 100%; padding: 12px 14px; border: 1px solid #c9e3cc; border-radius: 10px; }
        .field input:focus, .field select:focus { outline: none; border-color: #16a34a; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: #16a34a; color: white; font-weight: 700; cursor: pointer; }
        .btn:hover { background: #15803d; }
        .nav { margin-top: 20px; text-align: center; }
        .nav a { color: #16a34a; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="page-shell">
        <h1>Dodaj nauczyciela</h1>
        <form id="teacherForm">
            <div class="field">
                <label for="teacherName">Imię</label>
                <input type="text" id="teacherName" required>
            </div>
            <div class="field">
                <label for="teacherSurname">Nazwisko</label>
                <input type="text" id="teacherSurname" required>
            </div>
            <div class="field">
                <label for="teacherEmail">Email</label>
                <input type="email" id="teacherEmail" required>
            </div>
            <div class="field">
                <label for="teacherPassword">Hasło</label>
                <input type="password" id="teacherPassword" required>
            </div>
            <div class="field">
                <label for="teacherSubjects">Przedmiot</label>
                <input type="text" id="teacherSubjects" required>
            </div>
            <button type="submit" class="btn">Zapisz nauczyciela</button>
        </form>
        <div class="nav"><a href="../dashboard-admin.html">Powrót do panelu</a></div>
    </div>
    <script>
        document.getElementById('teacherForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Nauczyciel zapisany (tymczasowo).');
            window.location.href = '../dashboard-admin.html';
        });
    </script>
</body>
</html>
