<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nauczyciel - Geobecność</title>
    <link rel="stylesheet" href="formsStyle.css">
    <link rel="shortcut icon" href="../favicon.png" type="image/x-icon">
    <style>
    .list {
        max-height: 62vh;
    }
    </style>
    <script src="../script.js"></script>
</head>
<body>
    <div class="page-shell">
        <h1>Nauczyciele</h1>
        <div class="page-content">
            <section class="list-panel">
                <ul id="nauczycieleList" class="list"></ul>
            </section>
            <section class="form-panel">
                <h2>Dodaj nauczyciela</h2>
                <form id="teacherForm">    
                    <div class="field">
                        <label for="teacherName">Imię</label>
                        <input type="text" id="teacherName" required>
                    </div>
                    <div class="field">
                        <label for="teacherSurname">Nazwisko</label>
                        <input type="text" id="teacherSurname" required>
                    </div>
                    <div class="field">
                        <label for="teacherEmail">Email</label>
                        <input type="email" id="teacherEmail" required>
                    </div>
                    <div class="field">
                        <label for="teacherPassword">Hasło</label>
                        <input type="password" id="teacherPassword" required>
                    </div>
                    <div class="field">
                        <label for="teacherSubjects">Przedmiot</label>
                        <select id="teacherSubjects" required></select>
                    </div>
                    <button type="submit" class="btn">Zapisz nauczyciela</button>
                </form>
            </section>
        </div>
        <div class="nav"><a href="../dashboard-admin.html">Powrót do panelu</a></div>
    </div>
    <script>
        async function nauczycieleLista() {
            const listElement = document.getElementById('nauczycieleList');
            listElement.innerHTML = '';
            nauczyciele = JSON.parse(await zapytajSerwer("wybierzNauczycieli"));
            nauczyciele.forEach((nauczyciel, index) => {
                const item = document.createElement('li');
                item.innerHTML = `<span>${nauczyciel.imie} ${nauczyciel.nazwisko}</span>`;
                listElement.appendChild(item);
            });
        }

        

        async function zaladujPrzedmioty(){
            let przedmioty = await zapytajSerwer("wybierzPrzedmioty");
            console.log(przedmioty);
            przedmioty = JSON.parse(przedmioty);
            select = document.getElementById("teacherSubjects");
            przedmioty.forEach(przedmiot => {
                let option = document.createElement("option");
                option.value = przedmiot.id;
                option.innerText = przedmiot.nazwa;
                select.appendChild(option);
            });
        }

        document.getElementById('teacherForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            let tresc = new URLSearchParams,
            imie = document.getElementById("teacherName").value;
            nazwisko = document.getElementById("teacherSurname").value;
            email = document.getElementById("teacherEmail").value;
            haslo = document.getElementById("teacherPassword").value;
            przedmiot = document.getElementById("teacherSubjects").value;
            tresc.append("imie",imie);
            tresc.append("nazwisko",nazwisko);
            tresc.append("email",email);
            tresc.append("haslo",haslo);
            tresc.append("przedmiot",przedmiot);
            console.log(await zapytajSerwer("dodajNauczyciela",tresc));
            alert('Nauczyciel zapisany (tymczasowo).');
            nauczycieleLista();
            //window.location.href = '../dashboard-admin.html';
        });
        zaladujPrzedmioty();
        nauczycieleLista();
    </script>
</body>
</html>
