<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klasa - Geobecność</title>
    <link rel="stylesheet" href="formsStyle.css">
    <script src="../script.js"></script>
    <style>
    .list {
        max-height: 35vh;
    }
    </style>
</head>
<body>
    <div class="page-shell">
        <h1>Klasy</h1>
        <div class="page-content">
            <section class="list-panel">
                <ul id="klasyList" class="list"></ul>
            </section>
            <section class="form-panel">
                <h2>Dodaj nową klasę</h2>
                <form id="classForm">
                    <div class="field">
                        <label for="className">Nazwa klasy</label>
                        <input type="text" id="className" required>
                    </div>
                    <button type="submit" class="btn">Zapisz klasę</button>
                </form>
                <div class="nav"><a href="../dashboard-admin.html">Powrót do panelu</a></div>
            </section>
        </div>
    </div>
    <script>

        async function klasyLista() {
            const listElement = document.getElementById('klasyList');
            listElement.innerHTML = '';
            klasy = JSON.parse(await zapytajSerwer("wybierzKlasy"));
            klasy.forEach((klasa, index) => {
                const item = document.createElement('li');
                item.innerHTML = `<span>${klasa.nazwa}</span>`;
                listElement.appendChild(item);
                //jeśli chcesz piotrze tu więcej atrybutów by miały czy coś to idk tutaj
            });
        }

       
        document.getElementById('classForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            let tresc = new URLSearchParams,
            klasa = document.getElementById("className").value;
            tresc.append("klasa",klasa);
            console.log(await zapytajSerwer("dodajKlase",tresc));
            klasyLista();
        });
        klasyLista();
    </script>
</body>
</html>
